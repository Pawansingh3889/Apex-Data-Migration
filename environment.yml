name: apex-migration

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - pip:
      # Core data stack
      - polars>=1.0.0          # Fast DataFrame library (replaces pandas)
      - duckdb>=1.0.0          # Embedded analytical database

      # Machine learning
      - scikit-learn>=1.3.0    # IsolationForest anomaly detection
      - xgboost>=2.0.0         # CPU spike prediction model

      # Local AI (requires Ollama installed separately)
      - ollama>=0.1.0          # Python client for Ollama local LLMs

      # Visualisation
      - matplotlib>=3.7.0
      - seaborn>=0.13.0

      # Jupyter
      - jupyter
      - ipykernel
      - notebook
